<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan to Open App</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f0f9ff;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #0f172a;
        }

        .subtitle {
            color: #64748b;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }

        img {
            border: 4px solid white;
            border-radius: 0.5rem;
            box-shadow: 0 0 0 1px #e2e8f0;
            margin-bottom: 1.5rem;
            max-width: 100%;
            height: auto;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            text-align: left;
            margin-bottom: 1rem;
        }

        label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #475569;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #cbd5e1;
            border-radius: 0.5rem;
            font-family: monospace;
            font-size: 1rem;
            color: #334155;
            background: #f8fafc;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
            ring: 2px solid #3b82f6;
        }

        .help-text {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 0.25rem;
        }

        .divider {
            height: 1px;
            background: #e2e8f0;
            width: 100%;
            margin: 1.5rem 0;
        }

        a.btn {
            display: inline-block;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 500;
            margin-top: 1rem;
            transition: background 0.2s;
        }

        a.btn:hover {
            background: #2563eb;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Mobile Access</h1>
        <p class="subtitle">Scan this QR code with your phone camera</p>

        <img id="qr-image" src="" alt="QR Code" width="250" height="250">

        <div class="input-group">
            <label for="ip-input">Your Computer's IP Address</label>
            <input type="text" id="ip-input" placeholder="e.g. 192.168.1.100">
            <p class="help-text">Check your terminal output for the Network URL</p>
        </div>

        <div class="input-group">
            <label for="port-input">Port</label>
            <input type="text" id="port-input" placeholder="3001" value="3001">
        </div>

        <p id="status-text" style="font-size: 0.875rem; color: #0ea5e9;">Updating code...</p>
    </div>

    <script>
        const qrImage = document.getElementById('qr-image');
        const ipInput = document.getElementById('ip-input');
        const portInput = document.getElementById('port-input');
        const statusText = document.getElementById('status-text');

        // Try to detect sensible default
        let currentHost = window.location.hostname;
        let port = window.location.port || ((currentHost === 'localhost' || currentHost === '127.0.0.1') ? '3001' : '');
        portInput.value = port;

        // If localhost, clear it so user inputs the real one
        if (currentHost === 'localhost' || currentHost === '127.0.0.1') {
            currentHost = '192.168.1.1'; // Auto-detected from terminal
            ipInput.value = currentHost;
            statusText.innerText = "IP detected! Verify and scan.";
            statusText.style.color = "#10b981"; // Emerald
        } else {
            ipInput.value = currentHost;
            statusText.innerText = "Ready to scan!";
            statusText.style.color = "#10b981"; // Emerald
        }

        function updateQR() {
            const host = ipInput.value.trim() || 'localhost';

            // Clean host (remove http:// if pasted)
            const cleanHost = host.replace(/^https?:\/\//, '').replace(/\/$/, '');
            const cleanPort = portInput.value.trim();
            const protocol = window.location.protocol === 'https:' ? 'https' : 'http';
            const portSuffix = cleanPort ? `:${cleanPort}` : '';

            const fullUrl = `${protocol}://${cleanHost}${portSuffix}`;
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(fullUrl)}`;

            qrImage.src = qrUrl;

            if (cleanHost && cleanHost !== 'localhost' && cleanHost !== '127.0.0.1') {
                statusText.innerText = `Mobile link: ${fullUrl}`;
                statusText.style.color = "#334155";
            }
        }

        ipInput.addEventListener('input', updateQR);
        portInput.addEventListener('input', updateQR);

        // Initial Update
        updateQR();

    </script>
</body>

</html>
